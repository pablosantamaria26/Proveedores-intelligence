<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Proveedores — Mercado Limpio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   PROVEEDORES ML — Cuaderno de Cuentas Moderno
   Tema: Blanco vivo + Verde botella + Naranja acento
   Tipografía: Fraunces (display) + Plus Jakarta Sans (body)
   Alegre, claro, fácil para Laura
═══════════════════════════════════════════════════════ */
:root{
  --bg:       #F7F5F0;
  --bg2:      #FFFFFF;
  --bg3:      #F0EDE6;
  --ink:      #1A1A18;
  --ink2:     #4A4A45;
  --muted:    #9A9890;
  --border:   #E2DDD5;
  --border2:  #C8C3BA;

  --green:    #2D6A4F;
  --green2:   #40916C;
  --green3:   #74C69D;
  --green-bg: #EBF5EE;
  --green-lt: #D8EFDF;

  --red:      #C1121F;
  --red-bg:   #FEE9EA;
  --red-lt:   #FDD1D3;

  --yellow:   #D4800A;
  --yel-bg:   #FEF3E2;
  --yel-lt:   #FDDEA8;

  --blue:     #1D6FA4;
  --blue-bg:  #E8F3FB;

  --sat: env(safe-area-inset-top,0px);
  --sab: env(safe-area-inset-bottom,0px);
  --r: 16px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100dvh;
  overflow-x:hidden;
}

/* scrollbar */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg3);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── TOASTS ───────────────────────────────────────── */
#toasts{position:fixed;top:calc(var(--sat)+1rem);right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;pointer-events:none;width:min(320px,calc(100vw - 2rem));}
.toast{
  background:var(--bg2);border:1.5px solid var(--border2);
  border-radius:12px;padding:.75rem 1rem;
  display:flex;align-items:center;gap:.5rem;
  font-size:.82rem;font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,.12);
  animation:tin .2s ease both;pointer-events:auto;
}
.toast.ok{border-color:var(--green3);color:var(--green);}
.toast.err{border-color:var(--red-lt);color:var(--red);}
.toast.bye{animation:tout .2s ease forwards;}
@keyframes tin{from{opacity:0;transform:translateY(-8px) scale(.95)}to{opacity:1;transform:none}}
@keyframes tout{to{opacity:0;transform:translateY(-8px) scale(.95)}}

/* ── MODALS ───────────────────────────────────────── */
.mbk{display:none;position:fixed;inset:0;background:rgba(26,26,24,.55);backdrop-filter:blur(6px);z-index:500;align-items:flex-end;justify-content:center;padding:0;}
.mbk.on{display:flex;animation:mfade .18s ease;}
@keyframes mfade{from{opacity:0}to{opacity:1}}
@media(min-width:600px){.mbk{align-items:center;padding:1rem;}}
.modal{
  background:var(--bg2);
  border-radius:24px 24px 0 0;
  width:100%;max-width:540px;
  max-height:94dvh;overflow-y:auto;
  box-shadow:0 -8px 40px rgba(0,0,0,.15);
  animation:mup .28s cubic-bezier(.16,1,.3,1);
}
@media(min-width:600px){.modal{border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.2);}}
@keyframes mup{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.mhandle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0;display:block;}
@media(min-width:600px){.mhandle{display:none;}}
.mh{padding:1.25rem 1.5rem .875rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;}
.mt{font-family:'Fraunces',serif;font-size:1.35rem;font-weight:700;}
.mb{padding:0 1.5rem 1.5rem;}
.mclose{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:none;cursor:pointer;color:var(--muted);font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;}
.mclose:hover{background:var(--bg3);color:var(--ink);}

/* ── HEADER ───────────────────────────────────────── */
.header{
  background:var(--green);
  padding:calc(var(--sat)+1rem) 1.25rem 1.25rem;
  position:sticky;top:0;z-index:100;
}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:.75rem;max-width:900px;margin:0 auto;}
.header-logo{height:32px;filter:brightness(0) invert(1);opacity:.95;}
.header-title{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700;color:#fff;white-space:nowrap;}
.header-right{display:flex;align-items:center;gap:.5rem;}
.hbtn{
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);
  border-radius:10px;padding:.4rem .875rem;color:#fff;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;font-weight:700;
  cursor:pointer;transition:.15s;white-space:nowrap;
}
.hbtn:hover{background:rgba(255,255,255,.25);}
.hbtn.accent{background:#fff;color:var(--green);border-color:#fff;}
.hbtn.accent:hover{background:var(--bg3);}

/* ── PIN OVERLAY ──────────────────────────────────── */
#sc-pin{
  position:fixed;inset:0;
  background:linear-gradient(160deg,var(--green) 0%,#1B4332 100%);
  z-index:8000;display:flex;align-items:center;justify-content:center;padding:1.5rem;
}
.pin-card{
  background:#fff;border-radius:28px;
  padding:2.5rem 2rem;width:100%;max-width:360px;
  text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,.3);
  animation:mup .3s cubic-bezier(.16,1,.3,1);
}
.pin-logo{width:180px;margin:0 auto 1.5rem;display:block;}
.pin-title{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:900;color:var(--ink);margin-bottom:.3rem;}
.pin-sub{font-size:.85rem;color:var(--ink2);margin-bottom:2rem;line-height:1.5;}
.pin-input{
  width:100%;background:var(--bg3);border:2px solid var(--border);
  border-radius:14px;padding:1rem;text-align:center;
  font-family:'Fraunces',serif;font-size:1.8rem;letter-spacing:.5em;
  color:var(--ink);outline:none;transition:.15s;margin-bottom:.875rem;
}
.pin-input:focus{border-color:var(--green2);}
.pin-btn{
  width:100%;background:var(--green);border:none;border-radius:14px;
  padding:1rem;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:1rem;font-weight:800;cursor:pointer;transition:.15s;
}
.pin-btn:hover{background:var(--green2);}
.pin-skip{
  display:block;margin-top:1rem;font-size:.82rem;color:var(--muted);
  background:none;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;
  text-decoration:underline;
}

/* ── TABS ─────────────────────────────────────────── */
.tabs-strip{
  background:var(--bg2);border-bottom:2px solid var(--border);
  display:flex;overflow-x:auto;
  max-width:900px;margin:0 auto;
}
.tabs-strip::-webkit-scrollbar{display:none;}
.tab-btn{
  padding:.875rem 1.25rem;background:none;border:none;
  color:var(--muted);cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:.85rem;font-weight:700;white-space:nowrap;
  border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s;
}
.tab-btn.on{color:var(--green);border-bottom-color:var(--green);}
.tab-btn:hover:not(.on){color:var(--ink);}
.tabs-wrap{background:var(--bg2);border-bottom:2px solid var(--border);position:sticky;top:57px;z-index:90;}

.tab-panel{display:none;}
.tab-panel.on{display:block;animation:pin .2s ease both;}
@keyframes pin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── MAIN ─────────────────────────────────────────── */
.main{max-width:900px;margin:0 auto;padding:1.5rem 1.25rem calc(3rem + var(--sab));}

/* ── KPI ROW ──────────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem;margin-bottom:1.5rem;}
@media(min-width:700px){.kpi-row{grid-template-columns:repeat(4,1fr);}}
.kpi{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--r);padding:1.125rem 1.25rem;
  position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;
}
.kpi:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08);}
.kpi-ico{font-size:1.5rem;margin-bottom:.5rem;}
.kpi-val{
  font-family:'Fraunces',serif;
  font-size:clamp(1.15rem,3vw,1.55rem);
  font-weight:700;line-height:1;margin-bottom:.3rem;
}
.kpi-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.kpi.red{background:var(--red-bg);border-color:var(--red-lt);}
.kpi.red .kpi-val{color:var(--red);}
.kpi.yellow{background:var(--yel-bg);border-color:var(--yel-lt);}
.kpi.yellow .kpi-val{color:var(--yellow);}
.kpi.green{background:var(--green-bg);border-color:var(--green-lt);}
.kpi.green .kpi-val{color:var(--green);}

/* ── ALERT BANNER ─────────────────────────────────── */
.alert-banner{
  border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem;
  display:flex;align-items:flex-start;gap:.875rem;border:1.5px solid;
}
.alert-banner.red{background:var(--red-bg);border-color:var(--red-lt);}
.alert-banner.yellow{background:var(--yel-bg);border-color:var(--yel-lt);}
.ab-ico{font-size:1.3rem;flex-shrink:0;margin-top:.05rem;}
.ab-txt{}
.ab-title{font-weight:800;font-size:.9rem;margin-bottom:.2rem;}
.ab-desc{font-size:.78rem;color:var(--ink2);line-height:1.45;}

/* ── SECTION HEAD ─────────────────────────────────── */
.sec-head{display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap;}
.sec-title{
  font-family:'Fraunces',serif;font-size:1.15rem;font-weight:700;
  display:flex;align-items:center;gap:.5rem;
}

/* ── COMPRAS TABLE ────────────────────────────────── */
.card-table{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;}
.ct-head{
  padding:.875rem 1.25rem;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1.5px solid var(--border);
  flex-wrap:wrap;gap:.625rem;
}
.ct-title{font-weight:800;font-size:.9rem;}
.ct-cnt{font-size:.72rem;color:var(--muted);background:var(--bg3);border-radius:20px;padding:.2rem .75rem;font-weight:600;}

/* Desktop table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{
  background:var(--bg3);padding:.7rem 1rem;text-align:left;
  font-size:.62rem;font-weight:800;text-transform:uppercase;
  letter-spacing:.09em;color:var(--muted);border-bottom:1.5px solid var(--border);
}
.tbl tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
.tbl tbody tr:last-child{border-bottom:none;}
.tbl tbody tr:hover{background:var(--bg3);}
.tbl td{padding:.875rem 1rem;font-size:.85rem;vertical-align:middle;}
.td-mono{font-family:'Fraunces',serif;font-size:.85rem;}
.td-bold{font-weight:700;}

/* Mobile cards */
.mob-card{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:1rem 1.25rem;border-bottom:1px solid var(--border);gap:.875rem;
}
.mob-card:last-child{border-bottom:none;}
.mc-left{flex:1;min-width:0;}
.mc-prov{font-weight:800;font-size:.95rem;margin-bottom:.2rem;}
.mc-meta{font-size:.75rem;color:var(--muted);margin-bottom:.4rem;}
.mc-right{text-align:right;flex-shrink:0;}
.mc-monto{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700;margin-bottom:.3rem;}

@media(min-width:640px){.mob-only{display:none!important;}}
@media(max-width:639px){.desk-only{display:none!important;}}

/* ── BADGES ───────────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:.2rem;
  padding:.22rem .65rem;border-radius:20px;
  font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;
}
.b-pagado{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-lt);}
.b-a-pagar{background:var(--yel-bg);color:var(--yellow);border:1.5px solid var(--yel-lt);}
.b-vencido{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-lt);animation:pulse 1.2s ease-in-out infinite alternate;}
@keyframes pulse{from{opacity:1}to{opacity:.6}}

/* ── BTNS ─────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  border:none;border-radius:10px;padding:.55rem 1rem;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:700;
  cursor:pointer;transition:.15s;white-space:nowrap;
}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:var(--green2);}
.btn-ghost{background:var(--bg3);color:var(--ink2);border:1.5px solid var(--border);}
.btn-ghost:hover{background:var(--border);color:var(--ink);}
.btn-red{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-lt);}
.btn-red:hover{background:var(--red-lt);}
.btn-yellow{background:var(--yel-bg);color:var(--yellow);border:1.5px solid var(--yel-lt);}
.btn-yellow:hover{background:var(--yel-lt);}
.btn-sm{padding:.3rem .7rem;font-size:.72rem;border-radius:8px;}
.btn-big{padding:.875rem 1.75rem;font-size:1rem;border-radius:14px;}
.btn-full{width:100%;justify-content:center;}

/* ── FILTERS ──────────────────────────────────────── */
.filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center;}
.f-search{
  flex:1;min-width:160px;max-width:240px;
  display:flex;align-items:center;gap:.5rem;
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:10px;padding:.5rem .875rem;
}
.f-search input{background:none;border:none;outline:none;color:var(--ink);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;width:100%;}
.f-search input::placeholder{color:var(--muted);}
.f-sel{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:10px;padding:.5rem .875rem;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;color:var(--ink);
  cursor:pointer;transition:.15s;
}
.f-sel:focus{outline:none;border-color:var(--green2);}

/* ── FORMS ────────────────────────────────────────── */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:.875rem;}
@media(max-width:480px){.fgrid{grid-template-columns:1fr;}}
.fg{display:flex;flex-direction:column;gap:.3rem;}
.fg.full{grid-column:1/-1;}
.fg label{font-size:.72rem;font-weight:800;color:var(--ink2);text-transform:uppercase;letter-spacing:.07em;}
.fg input,.fg select,.fg textarea{
  background:var(--bg3);border:2px solid var(--border);
  border-radius:10px;padding:.65rem .875rem;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem;
  color:var(--ink);transition:.15s;width:100%;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  outline:none;border-color:var(--green2);background:#fff;
}
.fg input.big{font-size:1.3rem;font-family:'Fraunces',serif;font-weight:700;padding:.875rem;}
.fg textarea{min-height:70px;resize:vertical;}
.fg datalist{}
.fa{display:flex;gap:.625rem;justify-content:flex-end;margin-top:1.25rem;padding-top:1.25rem;border-top:1.5px solid var(--border);}

/* ── NUEVO COMPRA — pasos ─────────────────────────── */
.step-num{
  width:32px;height:32px;border-radius:50%;
  background:var(--green);color:#fff;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;flex-shrink:0;
}
.step-row{display:flex;gap:.875rem;align-items:flex-start;margin-bottom:1.5rem;}
.step-body{flex:1;}
.step-label{font-weight:800;font-size:.95rem;margin-bottom:.5rem;color:var(--ink);}
.step-hint{font-size:.78rem;color:var(--muted);margin-bottom:.625rem;line-height:1.4;}

/* ── PROV CHIPS ───────────────────────────────────── */
.prov-chips{display:flex;flex-wrap:wrap;gap:.375rem;margin-bottom:.5rem;}
.prov-chip{
  background:var(--green-bg);border:1.5px solid var(--green-lt);
  border-radius:20px;padding:.3rem .875rem;
  font-size:.8rem;font-weight:700;color:var(--green);
  cursor:pointer;transition:.15s;
}
.prov-chip:hover,.prov-chip.sel{background:var(--green);color:#fff;border-color:var(--green);}

/* ── PROV CARD ────────────────────────────────────── */
.prov-card{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--r);padding:1.125rem 1.25rem;
  margin-bottom:.625rem;
  display:flex;align-items:center;gap:1rem;
  cursor:pointer;transition:all .15s;
}
.prov-card:hover{border-color:var(--green2);box-shadow:0 4px 16px rgba(45,106,79,.1);}
.prov-avatar{
  width:44px;height:44px;border-radius:12px;
  background:var(--green);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700;
  flex-shrink:0;
}
.prov-info{flex:1;min-width:0;}
.prov-name{font-weight:800;font-size:.95rem;margin-bottom:.15rem;}
.prov-meta{font-size:.75rem;color:var(--muted);}
.prov-right{text-align:right;flex-shrink:0;}
.prov-deuda{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700;}
.prov-deuda.bad{color:var(--red);}
.prov-deuda.warn{color:var(--yellow);}
.prov-deuda.ok{color:var(--green);}

/* ── UPLOAD EXCEL ─────────────────────────────────── */
.upload-zone{
  border:2.5px dashed var(--border2);border-radius:16px;
  padding:2.5rem 1.5rem;text-align:center;cursor:pointer;transition:.2s;
  background:var(--bg3);
}
.upload-zone:hover,.upload-zone.drag{border-color:var(--green2);background:var(--green-bg);}
.upload-zone-ico{font-size:3rem;margin-bottom:.75rem;}
.upload-zone-title{font-weight:800;font-size:1.05rem;margin-bottom:.3rem;}
.upload-zone-sub{font-size:.8rem;color:var(--muted);}
.upload-result{
  border-radius:12px;padding:1rem 1.25rem;margin-top:1rem;font-size:.88rem;
  display:flex;align-items:center;gap:.75rem;
}
.upload-result.ok{background:var(--green-bg);border:1.5px solid var(--green-lt);color:var(--green);}
.upload-result.err{background:var(--red-bg);border:1.5px solid var(--red-lt);color:var(--red);}

/* ── LOADING ──────────────────────────────────────── */
.lov{
  position:fixed;inset:0;background:rgba(247,245,240,.85);
  backdrop-filter:blur(4px);z-index:9000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.lov-txt{font-size:.88rem;color:var(--ink2);font-weight:600;}

/* ── EMPTY ────────────────────────────────────────── */
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty-ico{font-size:3rem;opacity:.4;margin-bottom:.875rem;}

/* ── PABLO BADGE ──────────────────────────────────── */
.pablo-badge{
  display:inline-flex;align-items:center;gap:.375rem;
  background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);
  border-radius:20px;padding:.25rem .75rem;
  font-size:.72rem;font-weight:700;color:#fff;
}

/* ── CHART MINI ───────────────────────────────────── */
.mini-bars{display:flex;align-items:flex-end;gap:.3rem;height:80px;}
.mb-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:.2rem;min-width:0;}
.mb-bar{width:100%;border-radius:4px 4px 0 0;min-height:3px;transition:height .6s cubic-bezier(.16,1,.3,1);}
.mb-lbl{font-size:.58rem;color:var(--muted);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;}

/* ── PAGO MODAL extra ─────────────────────────────── */
.pago-resumen{
  background:var(--green-bg);border:2px solid var(--green-lt);
  border-radius:14px;padding:1.125rem;margin-bottom:1.25rem;
}
.pr-prov{font-family:'Fraunces',serif;font-size:1.25rem;font-weight:700;margin-bottom:.35rem;}
.pr-row{display:flex;justify-content:space-between;font-size:.85rem;padding:.2rem 0;}
.pr-val{font-weight:700;}

/* ── PABLO PANEL ──────────────────────────────────── */
.pablo-section{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--r);padding:1.5rem;margin-bottom:1.25rem;
}

<!-- ══ MODAL NUEVA COMPRA ════════════════════════ -->
<div id="m-compra" class="mbk">
  <div class="modal">
    <span class="mhandle"></span>
    <div class="mh">
      <span class="mt" id="m-compra-title">Nueva compra</span>
      <button class="mclose" onclick="App.close('m-compra')">✕</button>
    </div>
    <div class="mb">

      <!-- Paso 1: Proveedor -->
      <div class="step-row">
        <div class="step-num">1</div>
        <div class="step-body">
          <div class="step-label">¿A qué proveedor?</div>
          <div class="step-hint">Tocá un proveedor conocido o escribí uno nuevo abajo.</div>
          <div class="prov-chips" id="prov-chips"></div>
          <div class="fg">
            <input type="text" id="fc-prov" placeholder="O escribí el nombre..." autocomplete="off"
                   oninput="App.onProvInput(this.value)" list="prov-dl-nc">
            <datalist id="prov-dl-nc"></datalist>
          </div>
        </div>
      </div>

      <!-- Paso 2: Monto -->
      <div class="step-row">
        <div class="step-num">2</div>
        <div class="step-body">
          <div class="step-label">¿Cuánto fue la compra?</div>
          <div class="fg">
            <input type="number" id="fc-monto" class="big" placeholder="$ 0" min="0">
          </div>
        </div>
      </div>

      <!-- Paso 3: Fechas -->
      <div class="step-row">
        <div class="step-num">3</div>
        <div class="step-body">
          <div class="step-label">Fechas</div>
          <div class="fgrid">
            <div class="fg"><label>Fecha de la compra</label><input type="date" id="fc-fecha"></div>
            <div class="fg"><label>Fecha de vencimiento</label><input type="date" id="fc-venc"></div>
          </div>
        </div>
      </div>

      <!-- Paso 4: Extra (opcional) -->
      <div class="step-row">
        <div class="step-num">4</div>
        <div class="step-body">
          <div class="step-label">Opcional</div>
          <div class="fgrid">
            <div class="fg"><label>Nro. de factura</label><input type="text" id="fc-fac" placeholder="Ej: 0001-00012345"></div>
            <div class="fg"><label>Ya pagué (parcial)</label><input type="number" id="fc-pagado" placeholder="$ 0" min="0"></div>
            <div class="fg full"><label>Observaciones</label><textarea id="fc-obs" placeholder="Descuento, condición especial, etc."></textarea></div>
          </div>
        </div>
      </div>

      <div class="fa">
        <button class="btn btn-ghost" onclick="App.close('m-compra')">Cancelar</button>
        <button class="btn btn-green btn-big" onclick="App.guardarCompra()" id="btn-guardar-compra">Guardar compra ✓</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ MODAL PAGAR ═══════════════════════════════ -->
<div id="m-pagar" class="mbk">
  <div class="modal" style="max-width:420px">
    <span class="mhandle"></span>
    <div class="mh">
      <span class="mt">Registrar pago</span>
      <button class="mclose" onclick="App.close('m-pagar')">✕</button>
    </div>
    <div class="mb">
      <div class="pago-resumen" id="pagar-resumen"></div>
      <div class="fgrid">
        <div class="fg full">
          <label>¿Cuánto pagaste?</label>
          <input type="number" id="pagar-monto" class="big" placeholder="$ 0" min="0">
        </div>
        <div class="fg"><label>Fecha del pago</label><input type="date" id="pagar-fecha"></div>
        <div class="fg">
          <label>Cómo pagaste</label>
          <select id="pagar-medio">
            <option>Transferencia</option><option>Cheque</option>
            <option>Efectivo</option><option>Débito automático</option>
          </select>
        </div>
      </div>
      <div class="fa">
        <button class="btn btn-ghost" onclick="App.close('m-pagar')">Cancelar</button>
        <button class="btn btn-green btn-big" onclick="App.confirmarPago()">✅ Confirmar pago</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ LOADING ════════════════════════════════════ -->
<div class="lov" id="loading" style="display:none">
  <div class="spin"></div>
  <div class="lov-txt" id="loading-txt">Cargando...</div>
</div>

function toast(msg,type='',dur=3200){
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.textContent=msg;
  $('toasts').appendChild(el);
  setTimeout(()=>{el.classList.add('bye');setTimeout(()=>el.remove(),220);},dur);
}

function calcEstado(c){
  if(c.estado==='Pagado'||Number(c.a_pagar||0)<=0) return 'Pagado';
  const hoy=todayStr();
  if(!c.vencimiento) return 'A Pagar';
  const diff=Math.ceil((new Date(c.vencimiento+'T12:00:00')-new Date(hoy+'T12:00:00'))/86400000);
  if(diff<0) return 'Vencido';
  if(diff<=5) return 'Por vencer';
  return 'A Pagar';
}

    'Por vencer':'<span class="badge b-vencido">⚠️ Por vencer</span>',
    'Vencido':'<span class="badge b-vencido">🔴 Vencido</span>',
  };
  return map[est]||'<span class="badge b-a-pagar">—</span>';
}

// ── LOGIN ────────────────────────────────────────────
const App = {

  enterlaura(){
    STATE.role='laura';
    $('sc-pin').style.display='none';
    $('sc-app').style.display='';
    $('role-badge').style.display='none';
    $('btn-logout').style.display='none'; // Laura no necesita logout
    this.buildTabs();
  },

  enterPablo(){
    STATE.role='pablo';
    $('sc-pin').style.display='none';
    $('sc-app').style.display='';
    $('role-badge').style.display='';
    $('btn-logout').style.display='';
    this.buildTabs();
  },

  doPin(){
    const pin=$('pin-input').value.trim();
    if(pin===PABLO_PIN){ this.enterPablo(); }
    else{ toast('PIN incorrecto 🔐','err'); $('pin-input').value=''; $('pin-input').focus(); }
  },

  logout(){
    STATE.role='laura';
    $('sc-app').style.display='none';
    $('sc-pin').style.display='flex';
    $('pin-input').value='';
  },

  close(id){ $(id).classList.remove('on'); },

  // ── TABS ──────────────────────────────────────────
  buildTabs(){
    const logoSrc='data:image/png;base64,'+LOGO_B64;
    $('app-logo').src=logoSrc;

    const tabs = STATE.role==='pablo'
      ? [{id:'cuentas',label:'📊 Cuentas'},{id:'compras',label:'📋 Compras'},{id:'proveedores',label:'🏭 Proveedores'},{id:'cargar',label:'📂 Cargar Excel'},{id:'pablo',label:'👔 Mi resumen'}]
      : [{id:'cuentas',label:'📊 Estado actual'},{id:'compras',label:'📋 Compras'},{id:'proveedores',label:'🏭 Proveedores'}];

    $('tabs-strip').innerHTML = tabs.map((t,i)=>
      `<button class="tab-btn${i===0?' on':''}" onclick="App.tab('${t.id}',this)">${t.label}</button>`
    ).join('');
    this.renderTab(tabs[0].id);
  },

  tab(name,btn){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    this.renderTab(name);
  },

  renderTab(name){
    const m=$('app-main');
    switch(name){
      case 'cuentas':     m.innerHTML=this.tplCuentas();     this.hydrateCuentas();    break;
      case 'compras':     m.innerHTML=this.tplCompras();     this.hydrateCompras();    break;
      case 'proveedores': m.innerHTML=this.tplProveedores(); this.hydrateProveedores();break;
      case 'cargar':      m.innerHTML=this.tplCargar();                                break;
      case 'pablo':       m.innerHTML=this.tplPablo();       this.hydratePablo();      break;
    }
  },

  // ══════════════════════════════════════════════════
  // TAB: CUENTAS
  // ══════════════════════════════════════════════════
  tplCuentas(){
    return `
      <div class="kpi-row" id="kpi-row"></div>
      <div id="alertas-wrap"></div>
      <div class="sec-head">
        <div class="sec-title">💳 Lo que queda por pagar</div>
      </div>
      <div id="pendientes-wrap"></div>
      <div class="sec-head" style="margin-top:1.5rem">
        <div class="sec-title">🏭 Estado por proveedor</div>
      </div>
      <div id="prov-resumen"></div>
    `;
  },

  hydrateCuentas(){
    const hoy=todayStr();
    const activas=DB.compras.filter(c=>calcEstado(c)!=='Pagado');
    const vencidas=DB.compras.filter(c=>calcEstado(c)==='Vencido');
    const porVencer=DB.compras.filter(c=>calcEstado(c)==='Por vencer');
    const sum=arr=>arr.reduce((s,c)=>s+Number(c.a_pagar||0),0);
    const totalPagado=DB.compras.filter(c=>calcEstado(c)==='Pagado').reduce((s,c)=>s+Number(c.monto||0),0);

    // KPIs
    $('kpi-row').innerHTML=`
      <div class="kpi${vencidas.length?` red`:''}">
        <div class="kpi-ico">🔴</div>
        <div class="kpi-val">${fmtM(sum(vencidas))}</div>
        <div class="kpi-lbl">Vencido (${vencidas.length})</div>
      </div>
      <div class="kpi${porVencer.length?' yellow':''}">
        <div class="kpi-ico">⏳</div>
        <div class="kpi-val">${fmtM(sum(porVencer))}</div>
        <div class="kpi-lbl">Vence pronto</div>
      </div>
      <div class="kpi">
        <div class="kpi-ico">💳</div>
        <div class="kpi-val">${fmtM(sum(activas))}</div>
        <div class="kpi-lbl">Total a pagar</div>
      </div>
      <div class="kpi green">
        <div class="kpi-ico">✅</div>
        <div class="kpi-val">${fmtM(totalPagado)}</div>
        <div class="kpi-lbl">Ya pagado</div>
      </div>
    `;

    // Alertas
    let alertasHtml='';
    vencidas.forEach(c=>{
      alertasHtml+=`<div class="alert-banner red">
        <div class="ab-ico">🔴</div>
        <div class="ab-txt">
          <div class="ab-title">Pago vencido — ${c.proveedor}</div>
          <div class="ab-desc">La compra del ${fmtDate(c.fecha)} venció el ${fmtDate(c.vencimiento)}. Queda pendiente <strong>${fmtMFull(c.a_pagar)}</strong>.</div>
        </div>
      </div>`;
    });
    porVencer.forEach(c=>{
      const diff=Math.ceil((new Date(c.vencimiento+'T12:00:00')-new Date(hoy+'T12:00:00'))/86400000);
      alertasHtml+=`<div class="alert-banner yellow">
        <div class="ab-ico">⚠️</div>
        <div class="ab-txt">
          <div class="ab-title">Vence en ${diff} día${diff!==1?'s':''} — ${c.proveedor}</div>
          <div class="ab-desc">Pago de <strong>${fmtMFull(c.a_pagar)}</strong> vence el ${fmtDate(c.vencimiento)}.</div>
        </div>
      </div>`;
    });
    $('alertas-wrap').innerHTML=alertasHtml;

    // Pendientes
    const pends=DB.compras.filter(c=>calcEstado(c)!=='Pagado')
      .sort((a,b)=>{
        const ord={'Vencido':0,'Por vencer':1,'A Pagar':2};
        return (ord[calcEstado(a)]??3)-(ord[calcEstado(b)]??3);
      });
    if(pends.length===0){
      $('pendientes-wrap').innerHTML='<div class="empty"><div class="empty-ico">🎉</div><div style="font-weight:700;font-size:1.05rem">¡Todo al día!</div><div style="font-size:.85rem;margin-top:.3rem">No hay pagos pendientes.</div></div>';
    } else {
      $('pendientes-wrap').innerHTML=`<div class="card-table mob-cards-wrap">
        ${pends.map(c=>`
          <div class="mob-card">
            <div class="mc-left">
              <div class="mc-prov">${c.proveedor}</div>
              <div class="mc-meta">Compra: ${fmtDate(c.fecha)} · Vence: ${fmtDate(c.vencimiento)}</div>
              ${badgeHtml(calcEstado(c))}
            </div>
            <div class="mc-right">
              <div class="mc-monto" style="color:${calcEstado(c)==='Vencido'?'var(--red)':calcEstado(c)==='Por vencer'?'var(--yellow)':'var(--ink)'}">${fmtMFull(c.a_pagar)}</div>
              <button class="btn btn-green btn-sm" style="margin-top:.4rem" onclick="App.openPagar('${c.id}')">Pagar</button>
            </div>
          </div>`).join('')}
      </div>`;
    }

    // Resumen por proveedor
    const byProv={};
    DB.compras.forEach(c=>{
      if(!byProv[c.proveedor]) byProv[c.proveedor]={deuda:0,total:0,count:0};
      byProv[c.proveedor].deuda+=Number(c.a_pagar||0);
      byProv[c.proveedor].total+=Number(c.monto||0);
      byProv[c.proveedor].count++;
    });
    const provList=Object.entries(byProv).sort((a,b)=>b[1].deuda-a[1].deuda);
    $('prov-resumen').innerHTML=provList.map(([n,d])=>`
      <div class="prov-card">
        <div class="prov-avatar">${n.charAt(0).toUpperCase()}</div>
        <div class="prov-info">
          <div class="prov-name">${n}</div>
          <div class="prov-meta">${d.count} compra${d.count!==1?'s':''} · Total comprado: ${fmtM(d.total)}</div>
        </div>
        <div class="prov-right">
          <div class="prov-deuda ${d.deuda>0?'bad':'ok'}">${fmtM(d.deuda)}</div>
          <div style="font-size:.68rem;color:var(--muted)">${d.deuda>0?'pendiente':'al día ✅'}</div>
        </div>
      </div>`).join('');
  },

  // TAB: COMPRAS
  // ══════════════════════════════════════════════════
  tplCompras(){
    return `
      <div class="filters" id="comp-filters">
        <div class="f-search">
          <span style="color:var(--muted)">🔍</span>
          <input type="text" placeholder="Buscar proveedor..." id="search-comp" oninput="App.filtrarCompras()">
        </div>
        <select class="f-sel" id="filt-estado" onchange="App.filtrarCompras()">

          <option value="Vencido">🔴 Vencido</option>
          <option value="Por vencer">⚠️ Por vencer</option>
          <option value="A Pagar">⏳ A pagar</option>
          <option value="Pagado">✅ Pagado</option>
        </select>
        <select class="f-sel" id="filt-prov" onchange="App.filtrarCompras()">
          <option value="">Todos los proveedores</option>
        </select>
        <button class="btn btn-green" onclick="App.openNuevaCompra()">+ Nueva</button>
      </div>

      <!-- Desktop table -->
      <div class="card-table desk-only">
        <div class="ct-head">
          <span class="ct-title">Todas las compras</span>
          <span class="ct-cnt" id="comp-cnt">0 registros</span>
        </div>
        <div style="overflow-x:auto">
          <table class="tbl">
            <thead><tr>
              <th>Estado</th><th>Proveedor</th><th>Fecha</th>
              <th>Vencimiento</th><th>Total</th><th>Pagado</th><th>Resta</th><th></th>
            </tr></thead>
            <tbody id="comp-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Mobile cards -->
      <div class="mob-only" id="comp-mob"></div>

      <div class="empty" id="comp-empty" style="display:none">
        <div class="empty-ico">🔍</div><div>Sin resultados para ese filtro</div>
      </div>
    `;
  },

  hydrateCompras(){
    const provs=[...new Set(DB.compras.map(c=>c.proveedor))].sort();
    const ps=$('filt-prov');
    if(ps) ps.innerHTML='<option value="">Todos</option>'+provs.map(p=>`<option>${p}</option>`).join('');
    this.filtrarCompras();
  },

  filtrarCompras(){
    const search=($('search-comp')?.value||'').toLowerCase();
    const fEst=$('filt-estado')?.value||'';
    const fProv=$('filt-prov')?.value||'';

    let arr=DB.compras.filter(c=>{
      if(search&&!c.proveedor.toLowerCase().includes(search)) return false;
      if(fEst&&calcEstado(c)!==fEst) return false;
      if(fProv&&c.proveedor!==fProv) return false;
      return true;
    }).sort((a,b)=>{
      const ord={'Vencido':0,'Por vencer':1,'A Pagar':2,'Pagado':3};
      return (ord[calcEstado(a)]??4)-(ord[calcEstado(b)]??4)||new Date(b.fecha)-new Date(a.fecha);
    });

    if($('comp-cnt')) $('comp-cnt').textContent=arr.length+' registros';

    if(!arr.length){
      if($('comp-empty')) $('comp-empty').style.display='';
      if($('comp-tbody')) $('comp-tbody').innerHTML='';
      if($('comp-mob')) $('comp-mob').innerHTML='';
      return;
    }
    if($('comp-empty')) $('comp-empty').style.display='none';

    // Desktop
    if($('comp-tbody')) $('comp-tbody').innerHTML=arr.map(c=>{
      const est=calcEstado(c);
      const acPagar=Number(c.a_pagar||0);
      return `<tr>
        <td>${badgeHtml(est)}</td>
        <td class="td-bold">${c.proveedor}</td>
        <td class="td-mono">${fmtDate(c.fecha)}</td>
        <td class="td-mono" style="color:${est==='Vencido'?'var(--red)':est==='Por vencer'?'var(--yellow)':''}">${fmtDate(c.vencimiento)}</td>
        <td class="td-mono td-bold">${fmtMFull(c.monto)}</td>
        <td class="td-mono" style="color:var(--green)">${fmtMFull(c.pagado||0)}</td>
        <td class="td-mono" style="font-weight:700;color:${acPagar>0?(est==='Vencido'?'var(--red)':'var(--yellow)'):'var(--muted)'}">${acPagar>0?fmtMFull(acPagar):'—'}</td>
        <td>
          <div style="display:flex;gap:.3rem">
            ${acPagar>0?`<button class="btn btn-green btn-sm" onclick="App.openPagar('${c.id}')">Pagar</button>`:''}
            ${STATE.role==='pablo'?`<button class="btn btn-ghost btn-sm" onclick="App.editCompra('${c.id}')">✏️</button>
            <button class="btn btn-red btn-sm" onclick="App.delCompra('${c.id}')">🗑</button>`:''}
          </div>
        </td>
      </tr>`;
    }).join('');

    // Mobile
    if($('comp-mob')) $('comp-mob').innerHTML=arr.map(c=>{
      const est=calcEstado(c);
      const acPagar=Number(c.a_pagar||0);
      return `<div class="mob-card">
        <div class="mc-left">
          <div class="mc-prov">${c.proveedor}</div>
          <div class="mc-meta">${fmtDate(c.fecha)} · Vence ${fmtDate(c.vencimiento)}</div>
          ${c.nro_factura?`<div class="mc-meta">Fac: ${c.nro_factura}</div>`:''}
          <div style="margin-top:.35rem">${badgeHtml(est)}</div>
        </div>
        <div class="mc-right">
          <div class="mc-monto" style="color:${acPagar>0?(est==='Vencido'?'var(--red)':'var(--ink)'):'var(--muted)'}">${fmtMFull(c.monto)}</div>
          ${acPagar>0?`<div style="font-size:.72rem;color:var(--yellow);font-weight:700">Resta: ${fmtMFull(acPagar)}</div>`:''}
          <div style="display:flex;gap:.3rem;margin-top:.4rem;justify-content:flex-end;flex-wrap:wrap">
            ${acPagar>0?`<button class="btn btn-green btn-sm" onclick="App.openPagar('${c.id}')">Pagar</button>`:''}
            <button class="btn btn-ghost btn-sm" onclick="App.editCompra('${c.id}')">✏️</button>
          </div>
        </div>
      </div>`;
    }).join('');
  },

  // ══════════════════════════════════════════════════
  // NUEVA COMPRA
  // ══════════════════════════════════════════════════
  openNuevaCompra(){
    STATE.editId=null;
    $('m-compra-title').textContent='Nueva compra';
    $('fc-prov').value=''; $('fc-monto').value=''; $('fc-fecha').value=todayStr();
    $('fc-venc').value=''; $('fc-fac').value=''; $('fc-pagado').value=''; $('fc-obs').value='';
    this.buildProvChips();
    $('m-compra').classList.add('on');
    setTimeout(()=>$('fc-prov').focus(),300);
  },

  editCompra(id){
    const c=DB.compras.find(x=>x.id===id); if(!c) return;
    STATE.editId=id;
    $('m-compra-title').textContent='Editar compra';
    $('fc-prov').value=c.proveedor; $('fc-monto').value=c.monto;
    $('fc-fecha').value=c.fecha; $('fc-venc').value=c.vencimiento||'';
    $('fc-fac').value=c.nro_factura||''; $('fc-pagado').value=c.pagado||'';
    $('fc-obs').value=c.observaciones||'';
    this.buildProvChips(c.proveedor);
    $('m-compra').classList.add('on');
  },

  buildProvChips(sel=''){
    const chips=$('prov-chips'); if(!chips) return;
    const provs=DB.proveedores.map(p=>p.nombre).sort();
    chips.innerHTML=provs.map(p=>
      `<div class="prov-chip${sel===p?' sel':''}" onclick="App.selChip('${p}')">${p}</div>`
    ).join('');
    // Datalist for autocomplete
    $('prov-dl-nc').innerHTML=provs.map(p=>`<option value="${p}">`).join('');
  },

  selChip(nombre){
    $('fc-prov').value=nombre;
    document.querySelectorAll('.prov-chip').forEach(c=>{
      c.classList.toggle('sel',c.textContent===nombre);
    });
  },

  onProvInput(val){
    // Desmarcar chips si escribe algo diferente
    document.querySelectorAll('.prov-chip').forEach(c=>{
      c.classList.toggle('sel',c.textContent===val);
    });
  },

  guardarCompra(){
    const proveedor=($('fc-prov').value||'').trim();
    const monto=Number($('fc-monto').value||0);
    const fecha=$('fc-fecha').value;
    const venc=$('fc-venc').value;
    if(!proveedor){ toast('Escribí el nombre del proveedor','err'); $('fc-prov').focus(); return; }
    if(!monto){ toast('Ingresá el monto de la compra','err'); $('fc-monto').focus(); return; }
    if(!fecha){ toast('Ingresá la fecha de la compra','err'); return; }

    const pagado=Number($('fc-pagado').value||0);
    const a_pagar=Math.max(0,monto-pagado);

    if(STATE.editId){
      const idx=DB.compras.findIndex(c=>c.id===STATE.editId);
      if(idx>=0){
        DB.compras[idx]={...DB.compras[idx],proveedor,monto,fecha,vencimiento:venc,
          nro_factura:$('fc-fac').value,pagado,a_pagar,observaciones:$('fc-obs').value};
      }
      toast('✅ Compra actualizada','ok');
    } else {
      DB.compras.push({
        id:uid(),proveedor,monto,fecha,vencimiento:venc,
        nro_factura:$('fc-fac').value,pagado,a_pagar,
        observaciones:$('fc-obs').value,estado:'A Pagar'
      });
      toast('✅ Compra guardada','ok');
    }

    // Guardar proveedor si es nuevo
    if(!DB.proveedores.find(p=>p.nombre===proveedor)){
      DB.proveedores.push({id:uid(),nombre:proveedor});
    }

    saveDB(DB);
    this.close('m-compra');
    this.reloadCurrentTab();
  },

  delCompra(id){
    if(!confirm('¿Eliminar esta compra?')) return;
    DB.compras=DB.compras.filter(c=>c.id!==id);
    saveDB(DB); toast('Eliminada',''); this.reloadCurrentTab();
  },

  // ══════════════════════════════════════════════════
  // PAGAR
  // ══════════════════════════════════════════════════
  openPagar(id){
    const c=DB.compras.find(x=>x.id===id); if(!c) return;
    STATE.pagarId=id;
    $('pagar-monto').value=c.a_pagar||c.monto;
    $('pagar-fecha').value=todayStr();
    $('pagar-resumen').innerHTML=`
      <div class="pr-prov">${c.proveedor}</div>
      <div class="pr-row"><span>Total compra</span><span class="pr-val">${fmtMFull(c.monto)}</span></div>
      <div class="pr-row"><span>Ya pagado</span><span class="pr-val" style="color:var(--green)">${fmtMFull(c.pagado||0)}</span></div>
      <div class="pr-row"><span>Resta pagar</span><span class="pr-val" style="color:var(--red)">${fmtMFull(c.a_pagar||0)}</span></div>
    `;
    $('m-pagar').classList.add('on');
  },

  confirmarPago(){
    const c=DB.compras.find(x=>x.id===STATE.pagarId); if(!c) return;
    const montoPagado=Number($('pagar-monto').value||0);
    if(!montoPagado){ toast('Ingresá el monto que pagaste','err'); return; }
    const totalPagado=Number(c.pagado||0)+montoPagado;
    const resta=Math.max(0,Number(c.monto)-totalPagado);
    c.pagado=totalPagado;
    c.a_pagar=resta;
    c.estado=resta<=0?'Pagado':'A Pagar';
    c.fecha_pago=$('pagar-fecha').value;
    c.medio_pago=$('pagar-medio').value;
    saveDB(DB);
    this.close('m-pagar');
    toast(`✅ Pago registrado — ${fmtMFull(montoPagado)}`,'ok');
    this.reloadCurrentTab();
  },

  // ══════════════════════════════════════════════════
  // TAB: PROVEEDORES
  // ══════════════════════════════════════════════════
  tplProveedores(){
    return `
      <div class="sec-head">
        <div class="sec-title">🏭 Directorio de proveedores</div>
        <button class="btn btn-green btn-sm" onclick="App.addProv()">+ Agregar</button>
      </div>
      <div id="prov-list"></div>
    `;
  },

  hydrateProveedores(){
    const el=$('prov-list'); if(!el) return;
    const provs=[...DB.proveedores].sort((a,b)=>a.nombre.localeCompare(b.nombre));
    if(!provs.length){
      el.innerHTML='<div class="empty"><div class="empty-ico">🏭</div><div>Sin proveedores cargados</div></div>';
      return;
    }
    el.innerHTML=provs.map(p=>{
      const comps=DB.compras.filter(c=>c.proveedor===p.nombre);
      const deuda=comps.filter(c=>calcEstado(c)!=='Pagado').reduce((s,c)=>s+Number(c.a_pagar||0),0);
      const total=comps.reduce((s,c)=>s+Number(c.monto||0),0);
      return `<div class="prov-card">
        <div class="prov-avatar" style="background:${this.provColor(p.nombre)}">${p.nombre.charAt(0).toUpperCase()}</div>
        <div class="prov-info">
          <div class="prov-name">${p.nombre}</div>
          <div class="prov-meta">${comps.length} compra${comps.length!==1?'s':''} · Total: ${fmtM(total)}</div>
        </div>
        <div class="prov-right">
          <div class="prov-deuda ${deuda>0?'bad':'ok'}">${deuda>0?fmtM(deuda):'✅ Al día'}</div>
          ${STATE.role==='pablo'?`<button class="btn btn-red btn-sm" style="margin-top:.3rem" onclick="App.delProv('${p.id}')">Eliminar</button>`:''}
        </div>
      </div>`;
    }).join('');
  },

  provColor(nombre){
    const colors=['#2D6A4F','#1B4332','#40916C','#1D6FA4','#8B5E3C','#6B4226','#7B2D8B','#C1121F'];
    let hash=0; for(const c of nombre) hash=c.charCodeAt(0)+((hash<<5)-hash);
    return colors[Math.abs(hash)%colors.length];
  },

  addProv(){
    const nombre=prompt('Nombre del proveedor:');
    if(!nombre||!nombre.trim()) return;
    const n=nombre.trim();
    if(DB.proveedores.find(p=>p.nombre===n)){ toast('Ya existe ese proveedor',''); return; }
    DB.proveedores.push({id:uid(),nombre:n});
    saveDB(DB); toast('✅ Proveedor agregado','ok');
    this.hydrateProveedores();
    this.buildProvChips();
  },

  delProv(id){
    if(!confirm('¿Eliminar proveedor?')) return;
    DB.proveedores=DB.proveedores.filter(p=>p.id!==id);
    saveDB(DB); this.hydrateProveedores();
  },

  // ══════════════════════════════════════════════════
  // TAB: CARGAR EXCEL (solo Pablo)
  // ══════════════════════════════════════════════════
  tplCargar(){
    return `
      <div style="max-width:600px">
        <div style="font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700;margin-bottom:.5rem">📂 Importar desde Excel</div>
        <div style="color:var(--ink2);font-size:.88rem;margin-bottom:2rem;line-height:1.6">
          Subí el archivo Excel de proveedores y el sistema importa todas las compras automáticamente. Solo importa las filas con datos válidos — las vacías se ignoran.
        </div>

        <div class="pablo-section">
          <div class="ps-title">📋 Formato esperado</div>
          <div style="font-size:.82rem;color:var(--ink2);line-height:1.8">
            El archivo debe tener estas columnas (en cualquier orden):<br>
            <strong>Estado · Fecha de Emisión · Vencimiento del Pago · Proveedor · Nro de Factura · Total Compra · Total Pagado</strong>
            <br><br>
            ✅ El sistema detecta automáticamente el año a importar<br>
            ✅ Los proveedores nuevos se agregan solos al directorio<br>
            ✅ No duplica compras ya cargadas (usa fecha + proveedor + monto)
          </div>
        </div>

        <div class="upload-zone" id="uz-excel"
          onclick="$('file-excel').click()"
          ondragover="event.preventDefault();this.classList.add('drag')"
          ondragleave="this.classList.remove('drag')"
          ondrop="App.handleDrop(event)">
          <div class="upload-zone-ico">📊</div>
          <div class="upload-zone-title">Tocá para seleccionar el archivo Excel</div>
          <div class="upload-zone-sub">.xlsx o .xls — arrastrá o hacé click</div>
        </div>
        <input type="file" id="file-excel" accept=".xlsx,.xls" style="display:none" onchange="App.handleExcel(this)">

        <div id="upload-result"></div>

        <div class="pablo-section" style="margin-top:1.5rem">
          <div class="ps-title">🗑 Zona de peligro</div>
          <div style="font-size:.82rem;color:var(--ink2);margin-bottom:.875rem">Borrá todos los datos y empezá desde cero. No se puede deshacer.</div>
          <button class="btn btn-red" onclick="App.resetDB()">Borrar todos los datos</button>
        </div>
      </div>
    `;
  },

  handleDrop(ev){
    ev.preventDefault();
    $('uz-excel').classList.remove('drag');
    const file=ev.dataTransfer.files[0];
    if(file) this.processExcel(file);
  },

  handleExcel(input){
    const file=input.files[0];
    if(file) this.processExcel(file);
  },

  async processExcel(file){
    setLoading(true,'Leyendo Excel...');
    try{
      const data=await file.arrayBuffer();
      // Parsear XLSX manualmente — buscamos SheetJS via CDN
      const script=document.createElement('script');
      script.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      document.head.appendChild(script);
      await new Promise((res,rej)=>{script.onload=res;script.onerror=rej;});

      const wb=XLSX.read(data,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{raw:false,defval:''});

      // Normalizar headers
      const norm=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');

      let cargadas=0, dupes=0, errores=0;
      const nuevosProvs=new Set();

      rows.forEach(row=>{
        const r={};
        Object.entries(row).forEach(([k,v])=>{ r[norm(k)]=v; });

        const prov=String(r['proveedor']||r['nombre_proveedor']||'').trim();
        const fechaRaw=r['fecha_de_emision']||r['fecha_emision']||r['fecha']||'';
        const vencRaw=r['vencimiento_del_pago']||r['vencimiento']||r['fecha_vencimiento']||'';
        const montoRaw=r['total_compra']||r['monto']||r['total']||'';
        const pagadoRaw=r['total_pagado']||r['pagado']||'';

        if(!prov||!montoRaw) return;

        const monto=parseFloat(String(montoRaw).replace(/[$.,\s]/g,'').replace(',','.'));
        if(!monto||isNaN(monto)) return;

        // Parsear fecha
        let fecha='';
        try{
          const d=new Date(fechaRaw);
          if(!isNaN(d)) fecha=d.toLocaleDateString('sv-SE');
        }catch(e){}
        if(!fecha) return;

        let venc='';
        try{
          const d=new Date(vencRaw);
          if(!isNaN(d)) venc=d.toLocaleDateString('sv-SE');
        }catch(e){}

        const pagado=parseFloat(String(pagadoRaw).replace(/[$.,\s]/g,''))||0;
        const a_pagar=Math.max(0,monto-pagado);

        // Dedup: mismo proveedor + fecha + monto aproximado
        const exists=DB.compras.find(c=>
          c.proveedor===prov && c.fecha===fecha && Math.abs(c.monto-monto)<1
        );
        if(exists){ dupes++; return; }

        DB.compras.push({
          id:uid(), proveedor:prov, fecha, vencimiento:venc,
          monto, pagado, a_pagar, estado:a_pagar<=0?'Pagado':'A Pagar',
          nro_factura:'', observaciones:'', importado:true
        });
        nuevosProvs.add(prov);
        cargadas++;
      });

      // Agregar proveedores nuevos
      nuevosProvs.forEach(nombre=>{
        if(!DB.proveedores.find(p=>p.nombre===nombre)){
          DB.proveedores.push({id:uid(),nombre});
        }
      });

      saveDB(DB);
      setLoading(false);
      $('upload-result').innerHTML=`<div class="upload-result ok">
        ✅ <strong>${cargadas} compras importadas</strong> · ${dupes} ya existían (no duplicadas) · ${nuevosProvs.size} proveedores nuevos
      </div>`;
      toast(`✅ ${cargadas} compras importadas`,'ok');
    }catch(e){
      setLoading(false);
      $('upload-result').innerHTML=`<div class="upload-result err">❌ Error al leer el archivo: ${e.message}</div>`;
      toast('Error al leer el Excel','err');
    }
  },

  resetDB(){
    if(!confirm('¿Borrar TODOS los datos? Esto no se puede deshacer.')) return;
    if(!confirm('¿Seguro? Se pierden todas las compras.')) return;
    localStorage.removeItem(KEY);
    DB=loadDB();
    toast('Datos borrados — reimportados del Excel inicial','');
    this.renderTab('cargar');
  },

  // ══════════════════════════════════════════════════
  // TAB: PABLO RESUMEN
  // ══════════════════════════════════════════════════
  tplPablo(){
    return `
      <div style="font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;margin-bottom:1.5rem">👔 Mi resumen</div>
      <div id="pablo-content"></div>
    `;
  },

  hydratePablo(){
    const compras=DB.compras;
    const total=compras.reduce((s,c)=>s+Number(c.monto||0),0);
    const pagado=compras.reduce((s,c)=>s+Number(c.pagado||0),0);
    const deuda=compras.reduce((s,c)=>s+Number(c.a_pagar||0),0);
    const vencidas=compras.filter(c=>calcEstado(c)==='Vencido');
    const pendientes=compras.filter(c=>calcEstado(c)!=='Pagado');

    // Compras por proveedor para el gráfico
    const byProv={};
    compras.forEach(c=>{byProv[c.proveedor]=(byProv[c.proveedor]||0)+Number(c.monto||0);});
    const top5=Object.entries(byProv).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const maxV=Math.max(...top5.map(x=>x[1]),1);

    const colors=['#2D6A4F','#40916C','#74C69D','#1D6FA4','#D4800A'];

    $('pablo-content').innerHTML=`
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:.875rem;margin-bottom:1.5rem">
        <div class="kpi"><div class="kpi-ico">💰</div><div class="kpi-val">${fmtM(total)}</div><div class="kpi-lbl">Total comprado</div></div>
        <div class="kpi green"><div class="kpi-ico">✅</div><div class="kpi-val">${fmtM(pagado)}</div><div class="kpi-lbl">Total pagado</div></div>
        <div class="kpi${deuda>0?' yellow':''}"><div class="kpi-ico">⏳</div><div class="kpi-val">${fmtM(deuda)}</div><div class="kpi-lbl">Deuda total</div></div>
        <div class="kpi${vencidas.length?' red':''}"><div class="kpi-ico">🔴</div><div class="kpi-val">${vencidas.length}</div><div class="kpi-lbl">Pagos vencidos</div></div>
      </div>

      <div class="pablo-section">
        <div class="ps-title">📊 Compras por proveedor</div>
        <div class="mini-bars">
          ${top5.map(([n,v],i)=>`
            <div class="mb-wrap">
              <div class="mb-bar" style="height:${Math.max((v/maxV)*70,4)}px;background:${colors[i]};border-radius:6px 6px 0 0"></div>
              <div class="mb-lbl" title="${n}">${n.split(' ')[0]}</div>
            </div>`).join('')}
        </div>
        <div style="margin-top:1rem">
          ${top5.map(([n,v],i)=>`
            <div style="display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.85rem">
              <div style="display:flex;align-items:center;gap:.5rem">
                <div style="width:10px;height:10px;border-radius:2px;background:${colors[i]};flex-shrink:0"></div>
                <span style="font-weight:600">${n}</span>
              </div>
              <span style="font-family:'Fraunces',serif;font-weight:700">${fmtM(v)}</span>
            </div>`).join('')}
        </div>
      </div>

      <div class="pablo-section">
        <div class="ps-title">📅 Próximos vencimientos</div>
        ${pendientes.length===0
          ? '<div style="color:var(--green);font-weight:600">✅ Todo al día</div>'
          : pendientes.sort((a,b)=>new Date(a.vencimiento||'9999')-new Date(b.vencimiento||'9999')).slice(0,6).map(c=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:.625rem 0;border-bottom:1px solid var(--border);font-size:.85rem">
              <div>
                <div style="font-weight:700">${c.proveedor}</div>
                <div style="color:var(--muted);font-size:.75rem">Vence: ${fmtDate(c.vencimiento)}</div>
              </div>
              <div style="text-align:right">
                <div style="font-family:'Fraunces',serif;font-weight:700;color:${calcEstado(c)==='Vencido'?'var(--red)':'var(--yellow)'}">${fmtMFull(c.a_pagar)}</div>
                ${badgeHtml(calcEstado(c))}
              </div>
            </div>`).join('')
        }
      </div>
    `;
  },

  // ── HELPERS ───────────────────────────────────────
  reloadCurrentTab(){
    const active=document.querySelector('.tab-btn.on');
    if(active) active.click();
  },
};

</script>
